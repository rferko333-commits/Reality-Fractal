<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Language Undoer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent:      #b8922a;
            --accent-dim:  #8f6e1a;
            --accent-rgb:  184,146,42;

            --bg:          #0d0d0d;
            --card:        #161616;
            --card-alt:    #1c1c1c;
            --border:      #2a2a2a;
            --border-mid:  #333333;
            --text:        #e8e4dc;
            --text-dim:    #9a9690;
            --text-muted:  #666260;

            --font-display: 'Cinzel', Georgia, serif;
            --font-body:    'Raleway', sans-serif;
            --font-mono:    'Courier New', Courier, monospace;
            --radius:       10px;
            --radius-sm:    6px;
            --transition:   0.2s ease;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 30px 20px;
            line-height: 1.65;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(var(--accent-rgb),0.06) 0%, transparent 70%);
            transition: background-color 2s ease;
        }

        .container {
            max-width: 820px;
            margin: 0 auto;
            background: var(--card);
            padding: 50px 50px 40px;
            border-radius: 14px;
            border: 1px solid var(--border);
            box-shadow: 0 0 0 1px rgba(var(--accent-rgb),0.04), 0 20px 60px rgba(0,0,0,0.6);
            transition: opacity 1s ease;
        }

        h1 {
            font-family: var(--font-display);
            text-align: center;
            color: var(--text);
            font-size: 2rem;
            letter-spacing: 0.12em;
            font-weight: 600;
            margin: 0 0 6px;
        }

        .subtitle {
            text-align: center;
            font-size: 0.75rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 40px;
            font-weight: 500;
        }

        .section-label {
            font-size: 0.72rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 12px;
            font-weight: 600;
        }

        /* =========================================
           INPUT VIEW
        ========================================= */
        textarea {
            width: 100%;
            height: 240px;
            background: var(--card-alt);
            border: 1px solid var(--border-mid);
            color: var(--text);
            padding: 20px;
            font-family: var(--font-mono);
            font-size: 1rem;
            resize: none;
            outline: none;
            border-radius: var(--radius-sm);
            transition: border 0.3s ease;
            line-height: 1.7;
        }

        textarea::placeholder { color: var(--text-muted); }

        textarea:focus {
            border-color: rgba(var(--accent-rgb), 0.4);
            background: #1f1f1f;
        }

        /* =========================================
           BUTTONS
        ========================================= */
        .btn {
            display: inline-block;
            padding: 11px 20px;
            border: none;
            border-radius: var(--radius-sm);
            font-family: var(--font-body);
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            transition: var(--transition);
            background: transparent;
        }

        .btn-primary {
            background-color: var(--accent);
            color: #111;
            border: none;
            display: block;
            width: auto;
            padding: 12px 28px;
            font-size: 0.85rem;
            margin: 18px auto 0;
        }
        .btn-primary:hover { background-color: var(--accent-dim); }

        .btn-ghost {
            color: var(--text-muted);
            border: 1px solid var(--border-mid);
        }
        .btn-ghost:hover { border-color: var(--text-dim); color: var(--text); }

        .btn-dissolve {
            color: var(--accent);
            border: 1px solid rgba(var(--accent-rgb), 0.4);
        }
        .btn-dissolve:hover {
            background: rgba(var(--accent-rgb), 0.08);
            border-color: var(--accent);
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 28px;
            flex-wrap: wrap;
        }

        /* =========================================
           TOGGLE
        ========================================= */
        .toggle-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            border: 1px solid var(--border-mid);
            padding: 9px 14px;
            border-radius: var(--radius-sm);
            transition: var(--transition);
        }

        .toggle-box {
            width: 26px;
            height: 14px;
            border: 1px solid var(--border-mid);
            position: relative;
            transition: all 0.3s ease;
            border-radius: 999px;
        }

        .toggle-indicator {
            width: 10px;
            height: 10px;
            background-color: var(--text-muted);
            position: absolute;
            top: 1px;
            left: 1px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .toggle-active .toggle-box { border-color: var(--accent); }
        .toggle-active .toggle-indicator {
            background-color: var(--accent);
            transform: translateX(12px);
        }
        .toggle-active { color: var(--text); border-color: var(--border-mid); }

        /* =========================================
           OUTPUT STAGE
        ========================================= */
        #output-stage {
            width: 100%;
            min-height: 260px;
            font-family: var(--font-mono);
            font-size: 1.05rem;
            line-height: 2.2;
            white-space: pre-wrap;
            color: var(--text-dim);
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        /* =========================================
           ILLUSION WORDS
        ========================================= */
        .illusion {
            color: var(--accent);
            border-bottom: 1px dashed rgba(var(--accent-rgb), 0.5);
            cursor: pointer;
            display: inline;
            transition: all 0.2s ease;
        }

        .illusion:hover {
            color: #fff;
            border-bottom-color: var(--accent);
        }

        /* Tier 1: high-signal : full gold glow */
        .illusion.tier1 {
            color: var(--accent);
            border-bottom: 1px dashed rgba(var(--accent-rgb), 0.6);
        }
        .illusion.tier1:hover {
            text-shadow: 0 0 10px rgba(var(--accent-rgb), 0.6);
        }

        /* Tier 2: background noise : dim, unobtrusive */
        .illusion.tier2 {
            color: #6a5c3a;
            border-bottom: 1px dotted #4a3f28;
        }
        .illusion.tier2:hover {
            color: #9a8050;
            text-shadow: none;
            border-bottom-color: #6a5030;
        }

        .dissolved {
            opacity: 0;
            transition: opacity 0.8s ease;
            cursor: default;
            pointer-events: none;
        }

        /* =========================================
           FLOATING INSIGHT
        ========================================= */
        .floater {
            position: absolute;
            font-family: var(--font-body);
            font-size: 0.8rem;
            color: var(--text);
            background: var(--card-alt);
            border: 1px solid rgba(var(--accent-rgb), 0.35);
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            pointer-events: none;
            opacity: 0;
            animation: popIn 0.3s forwards, fadeOut 0.5s forwards 3.5s;
            width: max-content;
            max-width: 260px;
            text-align: center;
            z-index: 9999;
            box-shadow: 0 4px 20px rgba(0,0,0,0.7), 0 0 0 1px rgba(var(--accent-rgb),0.08);
            line-height: 1.5;
        }

        @keyframes popIn {
            0%   { opacity: 0; transform: translateY(4px); }
            100% { opacity: 1; transform: translateY(-6px); }
        }

        @keyframes fadeOut {
            to { opacity: 0; }
        }

        /* =========================================
           STAT BAR
        ========================================= */


        /* =========================================
           ACCORDION / HISTORY
        ========================================= */
        .accordion-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            padding: 14px 0;
            border-top: 1px solid var(--border);
            user-select: none;
        }
        .accordion-header:hover .acc-title { color: var(--text); }
        .acc-title {
            font-size: 0.72rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 600;
            transition: color 0.2s;
        }
        .acc-arrow {
            font-size: 0.85rem;
            color: var(--text-muted);
            transition: transform 0.25s ease;
        }
        .acc-arrow.open { transform: rotate(90deg); }
        .accordion-body {
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.35s ease;
        }
        .accordion-body.open { max-height: 9999px; }
        .accordion-body-inner { padding-bottom: 20px; }

        .log-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .log-entry {
            background: var(--card-alt);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .log-word {
            color: var(--accent);
            font-weight: 700;
            text-decoration: line-through;
            font-size: 0.9rem;
        }

        .log-count {
            background: var(--border-mid);
            color: var(--text-dim);
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .log-insight {
            font-size: 0.78rem;
            color: var(--text-muted);
            font-style: italic;
            border-top: 1px solid var(--border);
            padding-top: 6px;
            margin-top: 2px;
            line-height: 1.55;
        }

        /* =========================================
           VOID
        ========================================= */
        #void-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            background-color: transparent;
            transition: background-color 2s ease;
            gap: 32px;
        }

        #void-overlay.active {
            background-color: #000;
            pointer-events: auto;
        }

        #void-message {
            font-family: var(--font-display);
            font-size: 1rem;
            letter-spacing: 0.14em;
            color: #2a2a2a;
            opacity: 0;
            transition: opacity 3s ease;
            text-align: center;
            text-transform: uppercase;
        }

        #return-btn {
            background: transparent;
            border: 1px solid #2a2a2a;
            color: #2a2a2a;
            padding: 10px 20px;
            font-family: var(--font-body);
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 2s ease, color 0.2s, border-color 0.2s;
            cursor: pointer;
            border-radius: var(--radius-sm);
        }

        #return-btn:hover { color: #666; border-color: #666; }

        .container-hidden { opacity: 0; pointer-events: none; }

        .section-divider { border: none; border-top: 1px solid var(--border); margin: 28px 0; }

        @media (max-width: 600px) {
            .container { padding: 30px 22px 28px; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="container" id="main-container">
    <h1>Language Undoer</h1>

    <!-- INPUT VIEW -->
    <div id="input-view">
        <div class="section-label">Paste your narrative</div>
        <textarea id="user-input" placeholder="Write or paste any thought, belief, or story."></textarea>
        <button class="btn btn-primary" onclick="analyzeText()">Locate Bifurcations</button>
    </div>

    <!-- OUTPUT VIEW -->
    <div id="output-view" style="display:none;">

        <div id="output-stage"></div>

        <div class="controls">
            <div class="toggle-wrapper toggle-active" id="insight-toggle" onclick="toggleInsights()">
                <div class="toggle-box"><div class="toggle-indicator"></div></div>
                <span>Insights</span>
            </div>
            <button class="btn btn-dissolve" onclick="dissolveAll()">Dissolve All</button>
            <button class="btn btn-ghost" onclick="resetApp()">Reset</button>
            <button class="btn btn-ghost" onclick="enterVoid()">Silence</button>
            <span id="undoneCounter" style="font-size:0.72rem; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-muted); padding:0 4px; white-space:nowrap;"><span id="statDissolved">0</span> Undone</span>
        </div>



        <!-- History accordion -->
        <div style="margin-top: 24px;">
            <div class="accordion-header" onclick="toggleLog()">
                <span class="acc-title">Dissolution Record</span>
                <span class="acc-arrow" id="logArrow">&#9654;</span>
            </div>
            <div class="accordion-body" id="logBody">
                <div class="accordion-body-inner">
                    <div class="log-list" id="history-content"></div>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- VOID OVERLAY -->
<div id="void-overlay">
    <div id="void-message">Observe what remains without the story.</div>
    <button id="return-btn" onclick="exitVoid()">Return to Form</button>
</div>

<script>
    // ==========================================
    // STATE
    // ==========================================
    let showInsights  = true;
    let isLogOpen     = false;
    let historyData   = {};
    let totalFound    = 0;
    let totalDissolved = 0;

    // ==========================================
    // PATTERNS
    // ==========================================
    // ==========================================
    // PATTERN TIERS
    // Tier 1: High-signal ego constructs : bright gold, full insight
    // Tier 2: Background language : dim, subtle, minimal tooltip
    // ==========================================

    // ==========================================
    // PATTERN TIERS
    // Tier 1: high-signal constructs: full gold
    // Tier 2: background language: dim dotted
    // Strategy: tier 1 runs first and marks spans; tier 2 skips already-marked text.
    // Bias toward catching more rather than less.
    // ==========================================

    const TIER1 = [
        // Raw Resistance & Profanity (The "Heat" of the vent)
        { regex: /\b(fuck|fucking|fucked|shit|shitty|damn|dammit|stupid|idiot|sucks|sucking|crap|garbage)\b/gi,
          insight: "Pure resistance. Let the weather pass." },

        // Futility & Meaninglessness (The "Why Bother" trap)
        { regex: /\b(pointless|useless|meaningless|bullshit|what's the point|why bother|doesn't matter|does not matter|matters|give up|done trying|what is the point)\b/gi,
          insight: "Existence requires no justification." },

        // Harsh Identity Labels (Self-Harm via Language)
        { regex: /\b(loser|failure|worthless|burden|pathetic|joke|mess|fuckup|disappointment|ugly)\b/gi,
          insight: "You are a process, not a noun." },

        // Terminal Despair & Escape
        { regex: /\b(die|death|dead|kill|end it|can't go on|no way out|trapped|stuck)\b/gi,
          insight: "Feelings are temporary weather. Watch them pass." },

        // The Interrogation Loop (Demand for Narrative)
        { regex: /\b(why|how come|what did I do|reasons|reason|figure out|understand why)\b/gi,
          insight: "‘Why’ is a trap. Drop the storyline." },

        // Isolation & The Illusion of Separation
        { regex: /\b(alone|lonely|isolate|isolated|abandoned|rejected|unloved|ignored|invisible|outcast|nobody cares)\b/gi,
          insight: "Separation is an illusion. Awareness has no borders." },

        // Cries for External Rescue / Cosmic Pleading
        { regex: /\b(help|save me|cry for help|rescue|drowning|universe|god|anyone out there)\b/gi,
          insight: "The stillness you seek is already inside." },

        // The "If-Then" & Conditional Trap (The Waiting Room)
        { regex: /\b(if only|as soon as|when I finally|then I can|just need to|the only way to|if things were|if I could just)\b/gi,
          insight: "A trap. The present is not a waiting room." },

        // Time, Sunk Cost, & Exhaustion (The "Wasted" trap)
        { regex: /\b(wasted|waste of|lost time|ruined my|ruined|too late|exhausted|tired of|fed up|can't take it anymore|done with this|over it)\b/gi,
          insight: "You cannot waste the present moment." },

        // Unfairness & The "Ought To Be" (Victimization logic)
        { regex: /\b(unfair|not fair|deserve|deserved|robbed|cheated|lied to|supposed to be|should have been)\b/gi,
          insight: "Arguing with reality only creates suffering." },

        // Catastrophizing (The "End of the World" trap)
        { regex: /\b(everything is ruined|it's over|never going to work|doomed|disaster|worst thing|ruined everything)\b/gi,
          insight: "A fearful prediction. You are safe right now." },

        // The Societal "Success" Trap
        { regex: /\b(succeed|success|fail|failing|win|winning|losing|accomplish|achieve|progress)\b/gi,
          insight: "An invented game. Existence requires no achievement." },

        // Strong identity + predicate combos
        { regex: /\b(I am|I'm|I am not|I'm not|I was|I will|I'll|I would|I have|I've|I had|I should|I must|I can't|I cannot|I could never|I will never|I'll never|I have never|I've never|my own|myself|kind of person|type of person)\b/gi,
          insight: "Identity is just a story the mind tells." },

        // Absolute statements
        { regex: /\b(always|never|everyone|everybody|everything|nothing|no one|nobody|forever|constantly|every time|no matter what|without exception|inevitably|in every case)\b/gi,
          insight: "Absolutes are illusions. Everything is fluid." },

        // Modal imperatives
        { regex: /\b(should|shouldn't|should not|must|must not|have to|need to|ought to|supposed to|required to|obligated to|forced to)\b/gi,
          insight: "An argument with what IS. Who wrote this rule?" },

        // Causal load-bearing glue
        { regex: /\b(because|therefore|which means|that means|means that|implies|caused|the reason|so that|that is why|which is why|and so|and therefore|thus|hence|it follows)\b/gi,
          insight: "False glue. Is this actually true?" },

        // Hard limits and impossibility
        { regex: /\b(won't|will not|couldn't|could not|unable to|impossible|incapable|never able|there is no way|no way to|out of the question)\b/gi,
          insight: "An installed limit. Who installed it?" },

        // Core aversion
        { regex: /\b(hate|hates|hated|loathe|detest|resisting|dreading|can't stand|cannot stand|refuse to|will never accept|disgusts me|revolts me|appalls me)\b/gi,
          insight: "Resistance. What is the ego protecting?" },

        // Hard attachment and need
        { regex: /\b(I need|I needed|I must have|can't live without|desperate|desperately|can't let go|holding on|clinging|I depend on|I am attached|I have to have)\b/gi,
          insight: "Attachment creates the illusion of lack." },

        // Victimhood, blame, and cause-assignment
        { regex: /\b(fault|to blame|made me feel|because of you|because of them|because of him|because of her|victim|not fair|it's not fair|they ruined|he ruined|she ruined|you ruined|I was wronged|done to me|happened to me)\b/gi,
          insight: "Giving your inner peace to an outside force." },

        // Suffering and damage as fixed identity
        { regex: /\b(I am broken|I am damaged|I am ruined|my trauma|my damage|my wounds|I am scarred|I will never heal|I can't heal|permanently|irreparably|destroyed me|it broke me)\b/gi,
          insight: "Suffering became an identity. Drop the noun." },

        // Separation: fixed characterization of the other
        { regex: /\b(they always|they never|he always|he never|she always|she never|you always|you never|everyone else|those people|people like that|people like them)\b/gi,
          insight: "A fixed 'other' builds a fixed 'self'." },

        // Future dread and past regret
        { regex: /\b(I will always|I will never|I'll always|I'll never|I regret|I'll regret|I'll never forgive|I can never forgive|it will always|it will never|nothing will ever change|things never change|it never gets better)\b/gi,
          insight: "Using time as a weapon against the Now." },

        // 1. Mind-Reading & Projection (Arguing with ghosts)
        // I see this constantly: people suffering over what they *assume* others are thinking.
        { regex: /\b(they think I'm|everyone thinks|she probably|he probably|they secretly|judging me|think I am)\b/gi,
          insight: "You are arguing with an imaginary ghost." },

        // 2. The "Timeline" Trap (The illusion of being 'behind')
        // The modern ego measures itself against an invisible, arbitrary clock.
        { regex: /\b(behind in life|running out of time|everyone else is|catching up|too late for me|wasted my twenties|wasted my thirties|falling behind)\b/gi,
          insight: "Life has no finish line or schedule." },

        // 3. Imposter Syndrome (The fear of being 'unmasked')
        // An incredibly common ego defense: claiming you are fake before others can.
        { regex: /\b(imposter|fraud|fake|found out|pretending|not a real|faking it)\b/gi,
          insight: "Everyone is improvising. 'Perfect' doesn't exist." },

        // 4. Over-Responsibility / The Savior Complex
        // The ego loves to feel like it is the only thing holding the world together.
        { regex: /\b(I have to fix|it's all on me|if I don't who will|my responsibility to|holding it all together|depend on me entirely)\b/gi,
          insight: "You are not the manager of the universe." },

        // 5. Defensive Justification (Shielding the ego)
        // The language used right before the ego builds a wall to avoid being wrong.
        { regex: /\b(to be fair|I only did it because|well actually|you don't understand|had every right|justified)\b/gi,
          insight: "The ego demands defense. Awareness needs none." },

        // 6. The "Golden Age" Fallacy (Clinging to the past)
        // Suffering caused by comparing the raw present to a highly edited memory.
        { regex: /\b(never be the same|the good old days|used to be better|lost my spark|peaked|back when I was)\b/gi,
          insight: "Nostalgia is a ghost. Breathe in the Now." },

        // 7. The "Always Me" Probability Fallacy
        // Turning random chance into a personal attack by the universe.
        { regex: /\b(typical|of course this happens|always me|my luck|story of my life|cursed|why does this always)\b/gi,
          insight: "The universe is not singling you out." },

        // 8. Approval Seeking (Outsourcing self-worth)
        // The deep craving for an external authority to grant permission to exist.
        { regex: /\b(proud of me|validation|validate|approve of|impress them|notice me|make them like me)\b/gi,
          insight: "Seeking outside what only exists inside." },

        // 9. Exhaustion as Identity
        // It's normal to be tired, but the ego turns "tired" into a personality trait.
        { regex: /\b(too hard|overwhelming|draining|entirely drained|can't keep up|too much effort|exhausting)\b/gi,
          insight: "Rest, but do not become the exhaustion." },

        // 10. Perfectionism & The "Ruined" Fallacy
        // The ego's belief that if a thing is not 100% pure, it is 0% valuable.
        { regex: /\b(perfect|flawless|entirely ruined|completely destroyed|total failure|exactly right|has to be perfect)\b/gi,
          insight: "Perfection is a violent standard. Allow messiness." }

        // 1. Anxiety & The "What If" Spiral (Future hallucination)
        // This is the engine of panic attacks. The mind simulating threats that aren't happening.
        { regex: /\b(what if|worrying|worried|panicking|panic|freaking out|dread|dreading|anxious about)\b/gi,
          insight: "Imagining a future going wrong. Stay here." },

        // 2. The "Normalcy" Fallacy (Comparing self to a phantom)
        // The belief that everyone else has a manual for life that the user was denied.
        { regex: /\b(normal|like a normal person|wrong with me|why can't I just|defective|flawed)\b/gi,
          insight: "'Normal' is a ghost. You are nature." },

        // 3. Control & Grasping (The illusion of omnipotence)
        // Suffering caused by trying to dictate the exact flow of the universe.
        { regex: /\b(control|make sure that|force it|manipulate|take charge of|obsessing over|obsessed with|have to manage)\b/gi,
          insight: "Control is an illusion. Surrender to the flow." },

        // 4. Martyrdom & Unrecognized Sacrifice (Covert contracts)
        // The resentment of doing things for others and keeping a secret scorecard.
        { regex: /\b(after all I|unappreciated|taken for granted|used me|sacrificed|gave up everything for)\b/gi,
          insight: "True giving requires no receipt. Drop the debt." },

        // 5. Hindsight Bias & Self-Punishment (Beating up the past self)
        // Judging past actions using information you only have *now*.
        { regex: /\b(should have known|should have seen|knew it all along|how could I be so stupid|let this happen)\b/gi,
          insight: "Forgive your past self. They didn't know." },

        // 6. Hyper-Independence & Trust Wounds (Trauma masquerading as strength)
        // The ego deciding that total isolation is the only way to stay safe.
        { regex: /\b(trust no one|don't need anyone|on my own|do it myself|rely on anyone|people always leave|everyone leaves)\b/gi,
          insight: "A wall keeps pain out, but traps fear inside." },

        // 7. Jealousy, Envy & The "Greener Grass" 
        // Suffering the gap between your reality and someone else's highlight reel.
        { regex: /\b(jealous|envious|must be nice|why do they|they have it so easy|lucky|handed to them)\b/gi,
          insight: "Comparing your insides to their outside." },

        // 8. Expectation & Entitlement (The setup for disappointment)
        // Believing the universe owes you a specific outcome.
        { regex: /\b(expected|expecting|owed to me|promised me|supposed to happen|my turn|due for)\b/gi,
          insight: "Expectations are premeditated resentments." },

        // 9. Fixation on "Healing" as a Destination
        // The modern trap of treating yourself like a broken car that must remain in the shop.
        { regex: /\b(work on myself|need to be fixed|healing journey|heal first|not ready yet|too damaged to)\b/gi,
          insight: "You are not a broken machine. Live now." },

        // 10. Existential Numbness & Disconnection
        // When the system gets overloaded, it shuts down. The ego makes an identity out of the shutdown.
        { regex: /\b(numb|empty|feel nothing|dead inside|hollow|apathy|going through the motions|autopilot)\b/gi,
          insight: "Numbness is just exhausted feeling. Rest here." },

        // 11. Shame and Core Unworthiness
        // "Guilt means I did a bad thing. Shame means I am a bad thing."
        { regex: /\b(ashamed|unforgivable|monstrous|terrible person|my fault|punish myself|deserve to suffer)\b/gi,
          insight: "Shame is a liar. You are inherently worthy." },

        // 12. The "Someday" Delusion
        // Pushing peace into an ever-receding horizon.
        { regex: /\b(someday|one day|eventually things will|wait it out|biding my time|waiting for the right time)\b/gi,
          insight: "'Someday' is the ego's favorite hiding place." },

        // 13. The "Proof" Fallacy (Defending one's worth to phantoms)
        // Wasting energy trying to win an argument in someone else's head.
        { regex: /\b(prove them wrong|show them|make them regret|prove myself|demonstrate my worth|rub it in)\b/gi,
          insight: "You have nothing to prove to phantoms." },

        // 14. The Illusion of Permanence in Pain
        // The mind's tendency to take a momentary feeling and stretch it to infinity.
        { regex: /\b(always going to be|never stop hurting|endless|infinite|permanent|for the rest of my life)\b/gi,
          insight: "Every storm runs out of rain. This too passes." }

    // 1. Body Image & Flesh-Prison (The physical avatar trap)
        // Suffering caused by confusing the meat-suit for the soul.
        { regex: /\b(ugly|fat|disgusting|gross|hate my body|look terrible|hideous|unattractive|too skinny|hide my body)\b/gi,
          insight: "You are the observer, not the reflection." },

        // 2. Heartbreak & Betrayal (The attachment wound)
        // Venting about exes, toxic relationships, and abandonment.
        { regex: /\b(broke my heart|betrayed|cheated on me|left me|dumped me|toxic|narcissist|used me|played me|strung me along)\b/gi,
          insight: "Their actions reflect their conditioning, not you." },

        // 3. Financial & Survival Panic (The modern predator)
        // The deep biological terror triggered by capitalism.
        { regex: /\b(broke|poor|debt|homeless|no money|can't afford|destitute|bankrupt|ruined financially)\b/gi,
          insight: "Fear of tomorrow steals the breath of today." },

        // 4. The "Overthinker" Loop (Meta-anxiety)
        // Suffering caused by being mad at yourself for suffering.
        { regex: /\b(can't stop thinking|overthinking|racing thoughts|brain won't stop|obsessing over|figure it out|making sense of|my mind is driving me)\b/gi,
          insight: "The mind cannot solve the mind. Step out." },

        // 5. Age & Biological Clock Panic
        // Measuring the avatar against societal deadlines.
        { regex: /\b(too old|getting old|aging|past my prime|wasted my youth|clock is ticking|running out of years)\b/gi,
          insight: "Awareness has no age. Time is a concept." },

        // 6. Action-Specific Guilt (The "If I hadn't" trap)
        // Torturing the present self for a specific mistake made by the past self.
        { regex: /\b(I messed up|I fucked up|my mistake|terrible mistake|ruined it|if I hadn't|should have done it differently)\b/gi,
          insight: "The past is a ghost. Drop the whip." },

        // 7. Cosmic Punishment (The paranoid universe)
        // The ego's belief that God, Karma, or the Universe is actively out to get them.
        { regex: /\b(punished|God is punishing|karma|cursed|bad luck|bad karma|universe hates me|destined to suffer)\b/gi,
          insight: "The universe does not hold grudges." },

        // 8. The "Broken Brain" / Clinical Defeatism
        // The modern tendency to use psychology terms to lock oneself in a permanent cage.
        { regex: /\b(my trauma|triggered|my anxiety|my depression|chemically imbalanced|hardwired to|my adhd|my brain is broken)\b/gi,
          insight: "Labels describe weather. You are the sky." },

        // 9. Comparison to the Digital Void (Social Media Envy)
        // Measuring your behind-the-scenes against someone else's highlight reel.
        { regex: /\b(everyone else's life|on instagram|on social media|their life looks|having so much fun without me|missing out|fomo)\b/gi,
          insight: "You are comparing your reality to a commercial." },

        // 10. Apathy / The "Void" (When the ego gets tired of fighting)
        // A specific kind of depression where the person stops caring, but still hurts.
        { regex: /\b(don't care anymore|whatever|nothing matters|just existing|going through the motions|waiting to die)\b/gi,
          insight: "Apathy is just exhausted attachment. Rest here." }

        // Comparative self-diminishment
        { regex: /\b(not good enough|not smart enough|not strong enough|not worthy|unworthy|don't deserve|I don't deserve|I never deserved|less than|beneath|inferior to|I am less|I was less)\b/gi,
          insight: "A comparison used to shrink the self." }
    ];

    const TIER2 = [
        // Standalone self-reference (lower charge than full identity claims)
        { regex: /\b(I|me|my|mine)\b/gi,
          insight: "Where exactly is this 'I' located?" },

        // Other-reference
        { regex: /\b(you|your|he|him|his|she|her|they|them|we|our|us|people|person|others)\b/gi,
          insight: "Defining 'them' constructs the boundary of 'me'." },

        // Time units (To catch "wasted a *month*")
        { regex: /\b(years|months|month|weeks|days|hours|minutes|decades|lifetime)\b/gi,
          insight: "It is always now." },

        // Defeatist Glue
        { regex: /\b(guess|suppose|probably|maybe|literally|actually|basically)\b/gi,
          insight: "Filler words the mind uses to make its assumptions sound like absolute truth." },

        // Emotions
        { regex: /\b(happy|sad|angry|anger|rage|upset|frustrated|anxious|anxiety|depressed|depression|excited|bored|lonely|afraid|scared|joy|grief|guilty|guilt|shame|ashamed|jealous|envy|disgusted|surprised|hurt|heartbroken|devastated|overwhelmed|numb|empty)\b/gi,
          insight: "A temporary appearance within awareness." },

        // Thinking and mental activity
        { regex: /\b(think|thinking|thought|thoughts|believe|belief|imagine|wonder|assume|assumption|mind|mental|expect|expecting|perception|interpret|judgment)\b/gi,
          insight: "Thoughts are arisings. They appear and pass." },

        // Sensations
        { regex: /\b(pain|painful|pleasure|hurt|hurts|ache|aching|discomfort|sensation|feeling|feelings|felt|tense|tension|tight|heavy|light|numb|cold|warm)\b/gi,
          insight: "Sensations arise and dissolve. They are not you." },

        // Time reference
        { regex: /\b(yesterday|tomorrow|past|future|used to|someday|eventually|regret|last year|next year|when I was|back then|before|after|since|until|later|soon|once|previously)\b/gi,
          insight: "Time is memory or projection. Only Now exists." },

        // Comparative judgment
        { regex: /\b(better|worse|more|less|greater|behind|too much|not enough|compared|superior|inferior|bigger|smaller|higher|lower|stronger|weaker)\b/gi,
          insight: "Comparison requires two. Awareness has no size." },

        // General craving and desire
        { regex: /\b(want|wanted|wanting|desire|wish|hope|crave|long for|yearn|seek|searching|looking for|trying to find|hoping for)\b/gi,
          insight: "Wanting affirms a gap between here and where you think you should be." },

        // Judgment labels
        { regex: /\b(good|bad|right|wrong|evil|terrible|awful|horrible|perfect|worthless|useless|stupid|lazy|brilliant|great|best|worst|nice|mean|cruel|kind|weak|pathetic|ridiculous|absurd)\b/gi,
          insight: "A label applied to what just IS." },

        // General causality and conditionality
        { regex: /\b(if|when|unless|until|as long as|provided that|given that|in order to|so that|whenever|wherever)\b/gi,
          insight: "Conditions create time. Awareness is unconditional." },

        // Doership
        { regex: /\b(did|do|doing|done|made|making|create|created|caused|built|formed|produced|achieved)\b/gi,
          insight: "Events happen. Who is the doer?" },

        // To-be verbs
        { regex: /\b(is|are|was|were|be|been|being)\b/gi,
          insight: "Defining 'is-ness' limits the unlimited." },

        // Memory
        { regex: /\b(remember|remembering|memory|memories|recall|recollect|remind|reminds|reminded)\b/gi,
          insight: "Memory is a current thought about the past." },

        // Survival and material
        { regex: /\b(money|work|job|career|rich|poor|success|failure|status|power|control|achieve|achievement)\b/gi,
          insight: "Survival concepts. Awareness needs nothing." },
    ];


    // ==========================================
    // ANALYZE
    // ==========================================
    function analyzeText() {
        const rawText = document.getElementById('user-input').value;
        if (!rawText.trim()) return;

        document.getElementById('input-view').style.display   = 'none';
        document.getElementById('output-view').style.display  = 'block';
        document.getElementById('output-stage').innerHTML     = '';
        historyData    = {};
        totalFound     = 0;
        totalDissolved = 0;

        let workingText  = escapeHtml(rawText);
        let replacements = [];

        TIER1.forEach(p => {
            workingText = workingText.replace(p.regex, match => {
                const id = `___BIF_${replacements.length}___`;
                replacements.push({
                    id,
                    html: `<span class="illusion tier1" data-insight="${escapeHtml(p.insight)}" data-word="${escapeHtml(match)}" onclick="dissolveThis(this)">${match}</span>`
                });
                return id;
            });
        });

        TIER2.forEach(p => {
            workingText = workingText.replace(p.regex, match => {
                // Skip if already wrapped by tier1
                if (match.includes('___BIF_')) return match;
                const id = `___BIF_${replacements.length}___`;
                replacements.push({
                    id,
                    html: `<span class="illusion tier2" data-insight="${escapeHtml(p.insight)}" data-word="${escapeHtml(match)}" onclick="dissolveThis(this)">${match}</span>`
                });
                return id;
            });
        });

        replacements.forEach(r => { workingText = workingText.replace(r.id, r.html); });

        document.getElementById('output-stage').innerHTML = workingText;
        totalFound = document.querySelectorAll('.illusion').length;
        updateStats();
    }

    // ==========================================
    // DISSOLVE
    // ==========================================
    function dissolveThis(el) {
        if (el.classList.contains('dissolved')) return;
        el.classList.add('dissolved');
        trackHistory(el.getAttribute('data-word'), el.getAttribute('data-insight'));
        totalDissolved++;
        updateStats();
        if (showInsights) spawnFloater(el, el.getAttribute('data-insight'));
    }

    function dissolveAll() {
        document.querySelectorAll('.illusion:not(.dissolved)').forEach(el => {
            el.classList.add('dissolved');
            trackHistory(el.getAttribute('data-word'), el.getAttribute('data-insight'));
            totalDissolved++;
        });
        updateStats();
        if (isLogOpen) renderLog();
    }

    // ==========================================
    // STATS
    // ==========================================
    function updateStats() {
        const el = document.getElementById('statDissolved');
        if (el) el.textContent = totalDissolved;
    }

    // ==========================================
    // FLOATER
    // ==========================================
    function spawnFloater(el, text) {
        const rect    = el.getBoundingClientRect();
        const floater = document.createElement('div');
        floater.className   = 'floater';
        floater.textContent = text;
        document.body.appendChild(floater);

        const scrollX = window.pageXOffset || document.documentElement.scrollLeft;
        const scrollY = window.pageYOffset || document.documentElement.scrollTop;
        const fw = floater.offsetWidth;
        const fh = floater.offsetHeight;

        let left = rect.left + scrollX + rect.width / 2 - fw / 2;
        let top  = rect.top  + scrollY - fh - 10;

        const pad = 10;
        if (left < pad) left = pad;
        if (left + fw > window.innerWidth - pad) left = window.innerWidth - fw - pad;

        floater.style.left = left + 'px';
        floater.style.top  = top  + 'px';

        setTimeout(() => floater.remove(), 4500);
    }

    // ==========================================
    // HISTORY
    // ==========================================
    function trackHistory(word, insight) {
        const key = word.toLowerCase();
        if (!historyData[key]) {
            historyData[key] = { display: word, count: 1, insight };
        } else {
            historyData[key].count++;
        }
        if (isLogOpen) renderLog();
    }

    function renderLog() {
        const container = document.getElementById('history-content');
        container.innerHTML = '';
        const sorted = Object.keys(historyData).sort((a, b) => historyData[b].count - historyData[a].count);
        sorted.forEach(key => {
            const item = historyData[key];
            const div  = document.createElement('div');
            div.className = 'log-entry';
            div.innerHTML = `
                <div class="log-header">
                    <span class="log-word">${item.display}</span>
                    <span class="log-count">x${item.count}</span>
                </div>
                <div class="log-insight">${item.insight}</div>`;
            container.appendChild(div);
        });
    }

    function toggleLog() {
        isLogOpen = !isLogOpen;
        document.getElementById('logBody').classList.toggle('open', isLogOpen);
        document.getElementById('logArrow').classList.toggle('open', isLogOpen);
        if (isLogOpen) { renderLog(); setTimeout(() => window.scrollTo(0, document.body.scrollHeight), 50); }
    }

    // ==========================================
    // TOGGLE INSIGHTS
    // ==========================================
    function toggleInsights() {
        showInsights = !showInsights;
        document.getElementById('insight-toggle').classList.toggle('toggle-active', showInsights);
    }

    // ==========================================
    // VOID
    // ==========================================
    function enterVoid() {
        document.getElementById('main-container').classList.add('container-hidden');
        setTimeout(() => {
            const ov  = document.getElementById('void-overlay');
            const msg = document.getElementById('void-message');
            const btn = document.getElementById('return-btn');
            ov.classList.add('active');
            setTimeout(() => { msg.style.opacity = '1'; }, 500);
            setTimeout(() => { btn.style.opacity = '1'; }, 3000);
        }, 1000);
    }

    function exitVoid() {
        const ov  = document.getElementById('void-overlay');
        const msg = document.getElementById('void-message');
        const btn = document.getElementById('return-btn');
        msg.style.opacity = '0';
        btn.style.opacity = '0';
        ov.classList.remove('active');
        setTimeout(() => {
            document.getElementById('main-container').classList.remove('container-hidden');
        }, 1500);
    }

    // ==========================================
    // RESET
    // ==========================================
    function resetApp() {
        document.getElementById('user-input').value         = '';
        document.getElementById('input-view').style.display  = 'block';
        document.getElementById('output-view').style.display = 'none';
        document.getElementById('output-stage').innerHTML    = '';
        document.getElementById('history-content').innerHTML = '';
        historyData    = {};
        totalFound     = 0;
        totalDissolved = 0;
        isLogOpen      = false;
        document.getElementById('logBody').classList.remove('open');
        document.getElementById('logArrow').classList.remove('open');
    }

    // ==========================================
    // UTILS
    // ==========================================
    function escapeHtml(text) {
        if (!text) return '';
        return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
</script>
